# Server Configuration
server:
  forward-headers-strategy: framework

# Database Configuration
spring:
  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update

  # Google OAuth2
  security:
    oauth2:
      client:
        registration:
          google:
            client-id: ${GOOGLE_CLIENT_ID}
            client-secret: ${GOOGLE_CLIENT_SECRET}
            scope: email, profile

# JWT
jwt:
  secret: ${JWT_SECRET}

# AWS Configuration
cloud:
  aws:
    s3:
      bucket: novaterra-bucket
    region:
      static: ap-northeast-2
    stack:
      auto: false

# Blockchain Configuration (Giwa Chain - Ethereum 호환)
blockchain:
  network:
    rpc-url: ${BLOCKCHAIN_RPC_URL}
    chain-id: 91342

  wallet:
    private-key: ${BLOCKCHAIN_WALLET_PRIVATE_KEY}
  contract:
    krwt-token-address: ${BLOCKCHAIN_KRWT_TOKEN_ADDRESS}
    token-factory-address: ${BLOCKCHAIN_TOKEN_FACTORY_ADDRESS}
    identity-registry-address: ${BLOCKCHAIN_IDENTITY_REGISTRY_ADDRESS}
    claim-topics-registry-address: ${BLOCKCHAIN_CLAIM_TOPICS_REGISTRY_ADDRESS}
    trusted-issuers-registry-address: ${BLOCKCHAIN_TRUSTED_ISSUERS_REGISTRY_ADDRESS}
    modular-compliance-address: ${BLOCKCHAIN_MODULAR_COMPLIANCE_ADDRESS}

# Toss Payments Secret Key
toss:
  payments:
    secret-key: ${TOSS_SECRET_KEY}

# Application Settings
app:
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS}
  oauth2:
    redirect-uri: ${OAUTH2_REDIRECT_URI}
  swagger:
    servers:
      - url: http://localhost:8080
        description: Local HTTP Server
      - url: https://novaterra-hongik.duckdns.org
        description: Develop Server

